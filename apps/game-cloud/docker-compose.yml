services:
  cloud-game:
    image: cloud-game-local:latest
    environment:
      - DISPLAY=:99
      - MESA_GL_VERSION_OVERRIDE=4.5
      - CLOUD_GAME_WEBRTC_SINGLEPORT=8443
      - CLOUD_GAME_COORDINATOR_DEBUG=true
      - CLOUD_GAME_WORKER_DEBUG=true
    command: bash -c "./coordinator & ./worker"
    volumes:
      - ${APP_DATA_DIR}/cores:/usr/local/share/cloud-game/assets/cores
      - ${APP_DATA_DIR}/games:/usr/local/share/cloud-game/assets/games
      - x11:/tmp/.X11-unix
    ports:
      - "9000:9000"
      - "8443:8443/udp"
    depends_on:
      - xvfb
    x-runtipi:
      is_main: true
      internal_port: 8000

  xvfb:
    image: kcollins/xvfb:latest
    volumes:
      - x11:/tmp/.X11-unix
    command: [":99", "-screen", "0", "320x240x16"]

volumes:
  x11:

x-runtipi:
  schema_version: 2

{
  "schemaVersion": 2,
  "services": [
    {
      "name": "cloud-game",
      "image": "cloud-game-local:latest",
      "isMain": true,
      "internalPort": 8000
    }
  ]
}
